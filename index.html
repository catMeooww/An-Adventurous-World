<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Adventurous World</title>
    <link rel="shortcut icon" href="./interactor_assets/ExplorerPlayer.png" type="image/png">
    <link rel="stylesheet" href="play.css">
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-database.js"></script>
    <script src="serverdat.js"></script>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            background-image: url(StoneBar.png);
            text-align: center;
            overflow-y: visible;
            color: white;
        }

        #main-ui {
            background: url(CraftyAdventureBg.png);
            background-size: cover;
            margin-top: 100px;
            padding: 10px;
        }

        #main-ui button {
            width: 90%;
            padding: 1%;
            margin: 1%;
            background-color: rgba(0, 0, 0, 0.6);
            border: black outset 2px;
            color: cornflowerblue;
        }

        #levels{
            justify-items: center;
            overflow-y: scroll;
        }

        #levels div{
            display: block;
            width: 80%;
            border:outset 3px black;
            background-color: rgb(22, 22, 22);
            margin: 10px;
            padding: 2px;
        }

        #levels div:hover{
            box-shadow: 2px 2px 2px purple;
            border-color: green;
            cursor: pointer;
        }

        #levels img{
            width: 80%;
            border: solid 2px gray;
        }
    </style>
</head>

<body onload="loadUserData()">
    <div class="menu" id="levels">
        <button onclick="levels()">Close</button>
        <div id="The_Camp" onclick="goToMap(this.id)">
            <img src="./level_covers/The_Camp.png" class="levelimg"><br>
            <label>The Camp</label>
        </div>
        <div id="Path_In_Forest" onclick="goToMap(this.id)">
            <img src="./level_covers/Path_In_Forests.png" class="levelimg"><br>
            <label>Path in the Forests</label>
        </div>
    </div>
    <div class="ui" id="options">
        <button id="gamebtn">Adventurous World</button>
        <button onclick="levels()">Play</button>
        <button onclick="redirect(2)">Community Maps</button>
        <button id="accountBtn" onclick="redirect(1)">Account</button>
    </div>
    <section id="main-ui">
        <br><br><br><br><br><br><br><br>
        <button onclick="levels()">Play</button>
        <button onclick="redirect(2)">Community Maps</button>
        <button onclick="redirect(3)">Map Editor</button>
        <br><br><br><br>
    </section>
    <hr>
    <h3>An Adventurous World</h3>
    <label>By Cat Meooww</label>
    <hr>
    <h4>Also try other games:</h4>
    <a href="https://catmeooww.github.io/CatMeooww-GamingArea/">Cat Meooww Games page</a><br>
    <a href="https://catmeooww.github.io/Crafty-Adventure-Classical/">The crafty version of Adventurous World</a><br>
    <hr>
    <label style="float: right;">V.Realease 1</label>
    <script>
        function redirect(to){
            switch (to){
                case 1:
                    window.location = "./login.html";
                    break;
                case 2:
                    window.location = "./community.html";
                    break;
                case 3:
                    window.location = "./creator.html";
                    break;
                default:
                    window.location = "./";
                    break;
            }
        }

        function goToMap(id){
            window.location = "./game.html?official!"+id;
        }

        function levels(){
            if(document.getElementById("levels").style.visibility == "visible"){
                document.getElementById("levels").style.visibility = "hidden";
            }else{
                document.getElementById("levels").style.visibility = "visible";
                for(e=0;e<document.getElementsByClassName("levelimg").length;e++){
                    r = Math.floor(Math.random()*255);
                    g = Math.floor(Math.random()*255);
                    b = Math.floor(Math.random()*255);
                    document.getElementsByClassName("levelimg").item(e).style.borderColor = "rgb("+r+","+g+","+b+")";
                }
            }
        }

        function userLogged() {
            document.getElementById("accountBtn").innerHTML = user;
        }
    </script>
</body>

</html>
