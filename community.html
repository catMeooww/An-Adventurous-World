<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Adventurous World</title>
    <link rel="shortcut icon" href="./interactor_assets/ExplorerPlayer.png" type="image/png">
    <link rel="stylesheet" href="play.css">
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-database.js"></script>
    <script src="serverdat.js"></script>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            background-image: url(StoneBar.png);
            text-align: center;
            overflow-y: visible;
            color: white;
        }

        #main-ui {
            background: url(CraftyAdventureBg.png);
            background-size: cover;
            margin-top: 100px;
            padding: 10px;
        }

        #main-ui button {
            width: 90%;
            padding: 1%;
            margin: 1%;
            background-color: rgba(0, 0, 0, 0.6);
            border: black outset 2px;
            color: cornflowerblue;
        }
    </style>
</head>

<body onload="loadUserData();listMaps()">
    <div class="ui" id="options">
        <button id="gamebtn">Adventurous World</button>
        <button onclick="redirect(0)">Play</button>
        <button onclick="redirect(0)">Official Maps</button>
        <button id="accountBtn" onclick="redirect(1)">Account</button>
    </div>
    <section id="main-ui">
        <br><br><br><br><br><br><br><br>
        <button onclick="redirect(0)">Play Official Maps</button>
        <button onclick="redirect(3)">Create your Map</button>
        <br><br><br><br>
    </section>
    <hr>
    <div id="levels"></div>
    <script>
        function redirect(to){
            switch (to){
                case 1:
                    window.location = "./login.html";
                    break;
                case 2:
                    window.location = "./community.html";
                    break;
                case 3:
                    window.location = "./creator.html";
                    break;
                default:
                    window.location = "./";
                    break;
            }
        }

        function goToMap(id){
            window.location = "./game.html?community!"+id;
        }

        function listMaps(){
            firebase.database().ref("adventurous_world/maps/").on('value', function (snapshot) {
                document.getElementById("levels").innerHTML = "";
                snapshot.forEach(function (childSnapshot) {
                    childKey = childSnapshot.key; childData = childSnapshot.val();
                    r = Math.floor(Math.random()*200);
                    g = Math.floor(Math.random()*200);
                    b = Math.floor(Math.random()*200);
                    style = "class='mapdiv' style='background-color:rgb("+r+","+g+","+b+");'";
                    content = "<h3>"+childData["name"]+"</h3><label>By: "+childData["creator"]+"</label>";
                    document.getElementById("levels").innerHTML += "<div "+style+" onclick='"+'goToMap("'+childKey+'")'+"'>"+content+"</div>";
                });
            });
        }

        function userLogged() {
            document.getElementById("accountBtn").innerHTML = user;
        }
    </script>
</body>

</html>
